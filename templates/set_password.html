<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definir Senha — allbele.app</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #F8F9FA;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
}
.card {
    background: #fff;
    padding: 2.5rem 2rem;
    border-radius: 1rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    width: 100%;
    max-width: 400px;
    text-align: center;
}
.logo { font-size: 2rem; margin-bottom: 1rem; }
h1 { font-size: 1.4rem; font-weight: 700; color: #3A3330; margin-bottom: .35rem; }
.subtitle { font-size: .85rem; color: #888; margin-bottom: 1.75rem; }
input {
    width: 100%;
    padding: .75rem 1rem;
    border: 1.5px solid #E0E0E0;
    border-radius: .5rem;
    font-size: .95rem;
    font-family: inherit;
    margin-bottom: 1rem;
    color: #3A3330;
    transition: border-color .2s;
}
input:focus { outline: none; border-color: #D99C94; }
button {
    width: 100%;
    padding: .75rem;
    background: #3A3330;
    color: #fff;
    border: none;
    border-radius: .5rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .2s;
}
button:hover { background: #2A2320; }
button:disabled { background: #999; cursor: not-allowed; }
.msg { font-size: .85rem; margin-top: .75rem; }
.msg.error { color: #E74C3C; }
.msg.success { color: #27AE60; }
.rules { font-size: .78rem; color: #aaa; margin-bottom: 1rem; text-align: left; }
</style>
</head>
<body>
<div class="card">
    <div class="logo">🔐</div>
    <h1>Defina sua senha</h1>
    <p class="subtitle" id="subtitle">Configure a senha de acesso ao painel da sua clínica.</p>

    <div id="formArea">
        <p class="rules">Mínimo 8 caracteres.</p>
        <input type="password" id="pw1" placeholder="Nova senha" autofocus>
        <input type="password" id="pw2" placeholder="Confirmar senha">
        <button id="btnSave" onclick="savePassword()">Salvar senha</button>
        <div class="msg" id="msg"></div>
    </div>

    <div id="expiredArea" style="display:none">
        <p class="msg error">Link expirado ou inválido.<br>Solicite um novo acesso ao administrador.</p>
    </div>
</div>

<script>
// Lê parâmetros
const params  = new URLSearchParams(window.location.search);
const clinic  = params.get('clinic') || '';
const hash    = new URLSearchParams(window.location.hash.replace(/^#/, ''));
const token   = hash.get('access_token') || '';
const type    = hash.get('type') || '';

// Sem token → link inválido
if (!token) {
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('expiredArea').style.display = 'block';
}

// Limpa o hash da URL (segurança)
history.replaceState(null, '', window.location.pathname + window.location.search);

async function savePassword() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const msg = document.getElementById('msg');
    msg.className = 'msg';
    msg.textContent = '';

    if (!pw1 || pw1.length < 8) {
        msg.className = 'msg error';
        msg.textContent = 'A senha deve ter pelo menos 8 caracteres.';
        return;
    }
    if (pw1 !== pw2) {
        msg.className = 'msg error';
        msg.textContent = 'As senhas não coincidem.';
        return;
    }

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
        const resp = await fetch('/api/auth/set-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: pw1 }),
        });
        const data = await resp.json();
        if (resp.ok && data.ok) {
            msg.className = 'msg success';
            msg.textContent = 'Senha definida com sucesso! Redirecionando...';
            setTimeout(() => {
                const base = 'allbele.app';
                if (clinic) {
                    window.location.href = 'https://' + clinic + '.' + base + '/admin';
                } else {
                    window.location.href = 'https://admin.' + base + '/super';
                }
            }, 1500);
        } else {
            msg.className = 'msg error';
            msg.textContent = data.error || 'Erro ao salvar senha. Tente novamente.';
            btn.disabled = false;
            btn.textContent = 'Salvar senha';
        }
    } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'Erro de conexão.';
        btn.disabled = false;
        btn.textContent = 'Salvar senha';
    }
}

// Enter nas senhas
document.getElementById('pw2').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') savePassword();
});
</script>
</body>
</html>
